services:
  - type: web
    name: resume-builder-backend
    env: docker
    rootDir: resume-builder-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_API_URL
        value: https://router.huggingface.co/v1
      - key: HUGGINGFACE_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      - key: CORS_ALLOWED_ORIGINS
        value: https://resume-builder-frontend.onrender.com
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://ep-super-bird-amsh9ogy-pooler.c-5.us-east-1.aws.neon.tech/neondb?user=neondb_owner&password=npg_HtTu1ymMNKh6&sslmode=require&channelBinding=require
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        value: npg_HtTu1ymMNKh6
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PORT
        value: 10000
      - key: RAPIDAPI_JOBS_BASE_URL
        value: https://jsearch.p.rapidapi.com/search
      - key: RAPIDAPI_JOBS_HOST
        value: jsearch.p.rapidapi.com
      - key: RAPIDAPI_JOBS_KEY
        value: e4fb638178msh1d7c9c2937bc053p1c3ed9jsn57e97905fb87

  - type: web
    name: resume-builder-frontend
    env: static
    rootDir: resume-builder
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://resume-builder-backend.onrender.com/api