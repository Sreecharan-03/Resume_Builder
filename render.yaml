services:
  - type: web
    name: resume-builder-backend
    env: docker
    rootDir: resume-builder-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_API_URL
        value: https://router.huggingface.co/v1
      - key: HUGGINGFACE_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      - key: CORS_ALLOWED_ORIGINS
        value: https://resume-builder-frontend.onrender.com
      - key: SPRING_DATASOURCE_URL
        value: jdbc:h2:file:./data/resume-builder-db;MODE=MySQL;DB_CLOSE_DELAY=-1
      - key: SPRING_DATASOURCE_USERNAME
        value: sa
      - key: SPRING_DATASOURCE_PASSWORD
        value: ""
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.h2.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.H2Dialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: PORT
        value: 10000

  - type: web
    name: resume-builder-frontend
    env: static
    rootDir: resume-builder
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://resume-builder-backend.onrender.com/api