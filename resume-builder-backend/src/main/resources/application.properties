# Server Configuration
server.port=${PORT:${SERVER_PORT:8083}}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Database Configuration
# Default: local H2 DB (reliable for development)
# To use MySQL/Aiven, set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
# SPRING_DATASOURCE_PASSWORD, and SPRING_DATASOURCE_DRIVER_CLASS_NAME env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/resume-builder-db;MODE=MySQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration (Base64 encoded secret)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:3000}

# Logging
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:DEBUG}
logging.level.com.resumebuilder=${APP_LOG_LEVEL:DEBUG}

# Hugging Face AI Configuration
huggingface.api.key=${HUGGINGFACE_API_KEY:}
huggingface.api.url=${HUGGINGFACE_API_URL:https://router.huggingface.co/v1}
huggingface.model=${HUGGINGFACE_MODEL:Qwen/Qwen2.5-7B-Instruct}
